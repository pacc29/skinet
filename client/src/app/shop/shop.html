<div class="container mx-auto">
  <div class="flex gap-4">
    <section class="basis-1/4">
      <div class="mb-3">
        <h5 class="p-4 pb-2 text-sm opacity-60 tracking-wide prose">Sort</h5>
        <select class="select my-2">
          <option selected>Alphabetical</option>
          <option>Pirce: Low to high</option>
          <option>Price: High to low</option>
        </select>
      </div>

      <!-- Brands -->
      <div class="mb-3">
        <h5 class="p-4 pb-2 text-sm opacity-60 tracking-wide prose">Brands</h5>
        <ul class="list bg-base-100 rounded-box shadow-md my-2">
          <li class="list-row hover:bg-primary hover:transition-all">
            <div>Active item</div>
          </li>
          <li class="list-row hover:bg-primary hover:transition-all">
            <div>Second item</div>
          </li>
          <li class="list-row hover:bg-primary hover:transition-all">
            <div>Third item</div>
          </li>
          <li class="list-row hover:bg-primary hover:transition-all">
            <div>Fourth item</div>
          </li>
          <li class="list-row hover:bg-primary hover:transition-all">
            <div>Fifth item</div>
          </li>
        </ul>
      </div>

      <!-- Types -->
      <div>
        <h5 class="p-4 pb-2 text-sm opacity-60 tracking-wide prose">Types</h5>
        <ul class="list bg-base-100 rounded-box shadow-md my-2">
          <li class="list-row hover:bg-primary hover:transition-all">
            <div>Active item</div>
          </li>
          <li class="list-row hover:bg-primary hover:transition-all">
            <div>Second item</div>
          </li>
          <li class="list-row hover:bg-primary hover:transition-all">
            <div>Third item</div>
          </li>
          <li class="list-row hover:bg-primary hover:transition-all">
            <div>Fourth item</div>
          </li>
          <li class="list-row hover:bg-primary hover:transition-all">
            <div>Fifth item</div>
          </li>
        </ul>
      </div>
    </section>
    <section class="basis-3/4">
      <div class="flex items-center content-center justify-between pb-2">
        <header>
          <span>Showing <strong>10</strong> of <strong>18</strong> Results </span>
        </header>
        <div class="flex mt-2">
          <input class="input mr-2 form-control" placeholder="Search" />
          <button class="btn btn-primary btn-outline mx-2">Search</button>
          <button class="btn btn-success btn-outline">Reset</button>
        </div>
      </div>

      <div class="grid grid-cols-3 gap-4">
        <!-- Card -->
        @for (product of products; track product.id) {
          <app-product-item [product]="product"></app-product-item>
        }
      </div>
    </section>
  </div>
</div>
