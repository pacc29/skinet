<div class="join">
  <button class="join-item btn" (click)="goToPage(1)" [disabled]="pageIndex === 1">«</button>

  <button class="join-item btn" (click)="prevPage()" [disabled]="pageIndex === 1">‹</button>

  @for (page of pages; track page) {
    <button class="join-item btn" [class.btn-active]="page === pageIndex" (click)="goToPage(page)">
      {{ page }}
    </button>
  }

  <button class="join-item btn" (click)="nextPage()" [disabled]="pageIndex === totalPages">
    ›
  </button>

  <button
    class="join-item btn"
    (click)="goToPage(totalPages)"
    [disabled]="pageIndex === totalPages"
  >
    »
  </button>
</div>
